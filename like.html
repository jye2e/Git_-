<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fafafa;
}

.top {
  padding: 15px;
  border-bottom: 1px solid #ddd;
  text-align: center;
  font-weight: bold;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.gallery img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  cursor: pointer;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img {
  width: 80%;
  max-width: 300px;
}

.modal p {
  color: white;
  margin-top: 10px;
}

.close {
  color: white;
  margin-top: 15px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="top">Jiyoon Gallery</div>

<div class="gallery">
  <img src="img1.jpg" onclick="openModal('img1.jpg','여행에서 찍은 순간')">
  <img src="img2.jpg" onclick="openModal('img2.jpg','친구와 함께한 하루')">
  <img src="img3.jpg" onclick="openModal('img3.jpg','감성 풍경')">
  <img src="img4.jpg" onclick="openModal('img4.jpg','일상의 기록')">
</div>

<div class="modal" id="modal">
  <img id="modal-img">
  <p id="modal-text"></p>
  <div class="close" onclick="closeModal()">닫기</div>
</div>

<a href="index.html" style="display:block;text-align:center;padding:20px;">← 돌아가기</a>

<script>
function openModal(img, text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-img").src = img;
  document.getElementById("modal-text").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
