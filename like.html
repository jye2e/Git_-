<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #fafafa, #eeeeee);
}

/* 상단 */
.top {
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* 갤러리 */
.gallery {
  column-count: 2;
  column-gap: 10px;
  padding: 10px;
}

.item {
  break-inside: avoid;
  margin-bottom: 10px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  cursor: pointer;
}

/* 팝업 */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img {
  max-width: 85%;
  max-height: 70%;
  border-radius: 10px;
}

.modal p {
  color: white;
  margin-top: 12px;
  font-size: 14px;
}

.close {
  margin-top: 15px;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="top">📸 Jiyoon Gallery</div>

<div class="gallery">
  <div class="item">
    <img src="img1.jpg" onclick="openModal('img1.jpg','햇살 좋던 날')">
  </div>
  <div class="item">
    <img src="img2.jpg" onclick="openModal('img2.jpg','친구와의 순간')">
  </div>
  <div class="item">
    <img src="img3.jpg" onclick="openModal('img3.jpg','감성 풍경')">
  </div>
  <div class="item">
    <img src="img4.jpg" onclick="openModal('img4.jpg','기록하고 싶은 하루')">
  </div>
</div>

<div class="modal" id="modal">
  <img id="modal-img">
  <p id="modal-text"></p>
  <div class="close" onclick="closeModal()">닫기</div>
</div>

<a href="index.html" style="display:block;text-align:center;padding:20px;">← 돌아가기</a>

<script>
function openModal(img, text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-img").src = img;
  document.getElementById("modal-text").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
