<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Gallery</title>

<style>
  body {
    font-family: sans-serif;
    margin: 0;
    background: #fafafa;
    text-align: center;
  }

  h1 {
    margin: 30px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    width: 80%;
    margin: auto;
  }

  .gallery img {
    width: 100%;
    border-radius: 10px;
  }

  a {
    display: inline-block;
    margin: 30px;
    text-decoration: none;
    color: black;
  }

</style>
</head>

<body>

<h1>📸 My Gallery</h1>

<div class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
  <img src="img4.jpg">
  <img src="img5.jpg">
  <img src="img6.jpg">
</div>

<a href="index.html">← 돌아가기</a>

</body>
</html>
