<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 게시물</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #fafafa, #eeeeee);
}

.top {
  padding: 20px;
  text-align: center;
  font-weight: bold;
  font-size: 24px;
  background: linear-gradient(45deg, #feda75, #d62976, #962fbf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.gallery {
  column-count: 2;
  column-gap: 10px;
  padding: 10px;
}

.item {
  break-inside: avoid;
  margin-bottom: 10px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  cursor: pointer;
  transition: 0.3s;
}

.item img:hover {
  transform: scale(1.03);
}

/* ❤️ 좋아요 영역 */
.like {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 14px;
}

.like-text {
  color: #555;
}

.heart {
  font-size: 18px;
}

/* 팝업 */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeIn 0.3s ease;
}

.modal img {
  max-width: 85%;
  max-height: 70%;
  border-radius: 10px;
}

.modal p {
  color: white;
  margin-top: 12px;
  font-size: 14px;
}

.close {
  margin-top: 15px;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

a {
  text-decoration: none;
  color: #d62976;
  font-weight: bold;
}

/* 모바일 */
@media (max-width: 480px) {
  .gallery {
    column-count: 1;
  }

  .top {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="top">📸 게시물 사진 클릭하기!!</div>

<div class="gallery">

  <div class="item">
    <img src="img1.jpg" onclick="openModal('img1.jpg','저는 바다를 좋아하고 또 각종 페스티벌, 카페 탐방 등 새로운 곳을 탐험하는 걸 좋아합니다ㅎ 제일 좋아하는 장소는 저희 집이긴 합니다')">
    <div class="like" onclick="toggleLike(this)">
      <span class="like-text">좋아요를 눌러주세요 💗</span>
      <span class="heart">🤍</span>
    </div>
  </div>

  <div class="item">
    <img src="img2.jpg" onclick="openModal('img2.jpg','저는 코알라를 닮았따고 자주 놀림을 당합니다. ㅠㅠ 제가 싫어하는 저의 별명입니다 여러분이 보시기엔 닮았나요? 아니죠?')">
    <div class="like" onclick="toggleLike(this)">
      <span class="like-text">좋아요를 눌러주세요 💗</span>
      <span class="heart">🤍</span>
    </div>
  </div>

  <div class="item">
    <img src="img3.jpg" onclick="openModal('img3.jpg','최근 몇 달간 귀멸의 칼날에 뒤늦게 빠졌씁니다. 탄지로가 너무 좋습니다. ㅎㅎ 곧 무한성 영화가 재개봉 하는데 저랑 귀멸에 칼날에 입문하실 분들 구합니다. 가티 영화봐요!! 진짜루.')">
    <div class="like" onclick="toggleLike(this)">
      <span class="like-text">좋아요 눌러주세요 💗</span>
      <span class="heart">🤍</span>
    </div>
  </div>

  <div class="item">
    <img src="img4.jpg" onclick="openModal('img4.jpg','저는 깡아지를 참 좋아합니다. 특히 이렇게 생긴 똥깡아지 너무 넘무 귀여워서 마음이 힘듭니다. 혹시 키우신다면 제보 부탁드려요')">
    <div class="like" onclick="toggleLike(this)">
      <span class="like-text">좋아요 눌러주세요 💗</span>
      <span class="heart">🤍</span>
    </div>
  </div>

</div>

<div class="modal" id="modal">
  <img id="modal-img">
  <p id="modal-text"></p>
  <div class="close" onclick="closeModal()">닫기</div>
</div>

<a href="index.html" style="display:block;text-align:center;padding:20px;">← 돌아가기</a>

<script>
function openModal(img, text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-img").src = img;
  document.getElementById("modal-text").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function toggleLike(el) {
  const heart = el.querySelector(".heart");
  const text = el.querySelector(".like-text");

  if (heart.innerText === "🤍") {
    heart.innerText = "❤️";
    text.innerText = "좋아요💕";
  } else {
    heart.innerText = "🤍";
    text.innerText = "좋아요를 눌러주세요 💗";
  }
}
</script>

</body>
</html>
