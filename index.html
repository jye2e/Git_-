<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Jiyoon Portfolio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #fafafa, #f0f0f0);
}

.header {
  text-align: center;
  padding: 50px 20px 30px;
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff7eb3;
}

h1 {
  margin: 10px 0 5px;
}

.bio {
  color: #777;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 22px;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* 미리보기 */
.preview {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: auto;
  display: block;
}

</style>
</head>

<body>

<div class="header">
  <img src="profile.jpg" class="profile-img">
  <h1>Jiyoon</h1>
  <p class="bio">📍 Seoul </p>

  <a href="like.html" class="btn">View Gallery</a>
</div>

<div class="preview">
  <div class="card"><img src="img1.jpg"></div>
  <div class="card"><img src="img2.jpg"></div>
  <div class="card"><img src="img3.jpg"></div>
  <div class="card"><img src="img4.jpg"></div>
</div>

</body>
</html>
