<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>최지윤</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #fafafa;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
}

h1 {
  margin: 15px 0 5px;
}

.bio {
  color: gray;
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid #ddd;
  border-radius: 10px;
  text-decoration: none;
  color: black;
  margin-top: 15px;
  transition: 0.3s;
}

.btn:hover {
  background: black;
  color: white;
}

.card {
  width: 80%;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<div class="container">
  <img src="profile.jpg" class="profile">
  <h1>Jiyoon</h1>
  <p class="bio">Creative Thinker · Portfolio</p>

  <a href="like.html" class="btn">📸 내 갤러리 클릭 </a>
</div>

<div class="card">
  <h2>About Me</h2>
  <p>저는 새로운 경험을 쌓는 것을 매우 좋아합니당</p>
</div>

<div class="card">
  <h2>Interest</h2>
  <p>Web · UX · Creative Idea</p>
</div>

</body>
</html>
