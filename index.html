<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Jiyoon Portfolio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fafafa;
}

.header {
  text-align: center;
  padding: 40px 20px;
  border-bottom: 1px solid #ddd;
}

.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid transparent;
  background: linear-gradient(white, white) padding-box,
              linear-gradient(45deg, #feda75, #d62976, #962fbf) border-box;
}

h1 {
  margin: 10px 0 5px;
  font-size: 22px;
}

.bio {
  color: #666;
  font-size: 14px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid #ddd;
  text-decoration: none;
  color: black;
  transition: 0.3s;
}

.btn:hover {
  background: black;
  color: white;
}


.highlights {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin: 30px 0;
}

.highlight {
  text-align: center;
  font-size: 12px;
}

.highlight div {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(45deg, #feda75, #d62976, #962fbf);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  margin-bottom: 5px;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.preview img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="header">
  <img src="profile.jpg" class="profile-img">
  <h1>Jiyoon</h1>
  <p class="bio">📍 Seoul · Portfolio</p>

  <a href="like.html" class="btn">View Gallery</a>
</div>


<div class="highlights">
  <div class="highlight">
    <div>📸</div>
    <span>Photo</span>
  </div>
  <div class="highlight">
    <div>💡</div>
    <span>Idea</span>
  </div>
  <div class="highlight">
    <div>🎧</div>
    <span>Daily</span>
  </div>
</div>


<div class="preview">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
</div>

</body>
</html>

<div class="card">
  <h2>Interest</h2>
  <p>Web · UX · Creative Idea</p>
</div>

</body>
</html>
